<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Диаграмма Атрибутов</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background:
                radial-gradient(1200px 700px at 10% 20%, rgba(98, 42, 148, 0.35), transparent 65%),
                radial-gradient(900px 600px at 80% 10%, rgba(20, 110, 160, 0.28), transparent 62%),
                radial-gradient(1000px 700px at 60% 80%, rgba(30, 70, 130, 0.22), transparent 68%),
                linear-gradient(180deg, #05060f 0%, #080b18 45%, #050810 100%);
            color: #fff;
            overflow: hidden;
        }
        
        #container {
            width: 100vw;
            height: 100vh;
            position: relative;
            overflow: hidden;
            --space-x: 0px;
            --space-y: 0px;
            --space-scale: 1;
            --space-rot: 0;
            --warp: 0;
        }

        #container::before,
        #container::after {
            content: '';
            position: absolute;
            inset: -20%;
            pointer-events: none;
        }

        /* Dense twinkling star field */
        #container::before {
            z-index: 0;
            background-image:
                radial-gradient(2px 2px at 15% 18%, rgba(255, 255, 255, 1), transparent 62%),
                radial-gradient(2.4px 2.4px at 72% 26%, rgba(210, 235, 255, 0.98), transparent 62%),
                radial-gradient(2px 2px at 40% 70%, rgba(255, 250, 235, 0.98), transparent 62%),
                radial-gradient(2.8px 2.8px at 88% 62%, rgba(255, 255, 255, 1), transparent 62%),
                radial-gradient(2px 2px at 55% 44%, rgba(220, 245, 255, 0.96), transparent 62%),
                radial-gradient(2.6px 2.6px at 28% 52%, rgba(255, 255, 255, 0.99), transparent 62%),
                radial-gradient(2px 2px at 83% 80%, rgba(255, 250, 245, 0.96), transparent 62%),
                radial-gradient(2.4px 2.4px at 12% 75%, rgba(220, 235, 255, 0.96), transparent 62%);
            background-size: 150px 150px, 190px 190px, 170px 170px, 210px 210px, 180px 180px, 220px 220px, 190px 190px, 230px 230px;
            opacity: 1;
            transform:
                translate3d(calc(var(--space-x) * 0.35), calc(var(--space-y) * 0.35), 0)
                scale(calc(1 + (var(--space-scale) - 1) * 0.08 + var(--warp) * 0.35))
                rotate(calc(var(--space-rot) * 0.18deg));
            filter: brightness(calc(1 + var(--warp) * 0.95));
            animation: starTwinkle 6s ease-in-out infinite;
            will-change: transform, filter, opacity;
        }

        /* Nebula + milky way band */
        #container::after {
            z-index: 1;
            background:
                radial-gradient(700px 300px at 58% 45%, rgba(220, 230, 255, 0.11), transparent 65%),
                radial-gradient(580px 260px at 45% 55%, rgba(170, 210, 255, 0.09), transparent 70%),
                radial-gradient(480px 220px at 62% 50%, rgba(255, 210, 240, 0.07), transparent 72%),
                radial-gradient(800px 250px at 50% 50%, rgba(240, 245, 255, 0.08), transparent 75%);
            transform:
                translate3d(calc(var(--space-x) * 0.6), calc(var(--space-y) * 0.6), 0)
                rotate(calc(-18deg + var(--space-rot) * 1deg))
                scale(calc(1.08 + (var(--space-scale) - 1) * 0.12 + var(--warp) * 0.28));
            filter: blur(calc(1px + var(--warp) * 2.4px)) brightness(calc(1 + var(--warp) * 0.8));
            opacity: 0.85;
            animation: nebulaPulse 14s ease-in-out infinite alternate;
            will-change: transform, filter, opacity;
        }

        #controls {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 1000;
        }

        #diagram {
            position: relative;
            z-index: 2;
        }
        
        button {
            padding: 10px 20px;
            font-size: 16px;
            background: #4a4a4a;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        button:hover {
            background: #5a5a5a;
        }
        
        .node-circle {
            stroke: #fff;
            stroke-width: 2;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .node-circle:hover {
            stroke-width: 3;
            filter: brightness(1.2);
        }
        
        .node-circle.focused {
            stroke: #ffff00;
            stroke-width: 4;
        }
        
        .node-circle.dimmed {
            opacity: 0.2;
        }
        
        .link {
            fill: none;
            stroke: #666;
            stroke-width: 1.5;
            opacity: 0.6;
        }
        
        .link.focused {
            stroke: #ffff00;
            stroke-width: 3;
            opacity: 1;
        }
        
        .link.dimmed {
            opacity: 0.1;
        }
        
        .node-text {
            text-anchor: middle;
            dominant-baseline: auto;
            font-size: 12px;
            font-weight: 800;
            paint-order: stroke fill;
            stroke-width: 2.5px;
            pointer-events: none;
            user-select: none;
        }

        .node-icon-image {
            pointer-events: none;
            opacity: 0.96;
            clip-path: circle(50% at 50% 50%);
        }
        
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
            color: #fff;
            z-index: 3;
        }

        #tooltip {
            position: absolute;
            z-index: 1200;
            pointer-events: none;
            min-width: 220px;
            max-width: 360px;
            padding: 10px 12px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.28);
            background: rgba(8, 12, 24, 0.92);
            color: #f6f8ff;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.45);
            opacity: 0;
            transform: translateY(4px);
            transition: opacity 120ms ease, transform 120ms ease;
            backdrop-filter: blur(4px);
            box-sizing: border-box;
        }

        #tooltip.visible {
            opacity: 1;
            transform: translateY(0);
        }

        #tooltip .tooltip-label {
            font-size: 11px;
            color: #9fb2d8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 2px;
        }

        #tooltip .tooltip-value {
            font-size: 13px;
            line-height: 1.35;
            margin-bottom: 8px;
            color: #f4f7ff;
        }

        #tooltip .tooltip-value:last-child {
            margin-bottom: 0;
        }

        #tooltip .tooltip-icon-wrap {
            position: absolute;
            top: 10px;
            right: 12px;
            width: 76px;
            height: 76px;
            margin: 0;
            padding: 4px;
            border-radius: 50%;
            border: 4px solid transparent;
            background:
                linear-gradient(
                    132deg,
                    rgba(255, 255, 255, 0.02) 34%,
                    rgba(255, 255, 255, 0.78) 45%,
                    rgba(255, 255, 255, 0.16) 50%,
                    rgba(255, 255, 255, 0.03) 55%,
                    rgba(0, 0, 0, 0.14) 76%
                ),
                linear-gradient(
                    145deg,
                    color-mix(in srgb, var(--rank-color, #ffffff) 88%, #111722),
                    color-mix(in srgb, var(--rank-color, #ffffff) 36%, #060a14)
                );
            box-sizing: border-box;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow:
                0 0 0 1px rgba(255, 255, 255, 0.28) inset,
                -10px -10px 18px color-mix(in srgb, var(--rank-color, #ffffff) 44%, transparent),
                8px 8px 22px color-mix(in srgb, var(--rank-color, #ffffff) 22%, transparent),
                0 0 24px color-mix(in srgb, var(--rank-color, #ffffff) 26%, transparent);
        }

        #tooltip .tooltip-icon {
            width: 100%;
            height: 100%;
            display: block;
            border-radius: 50%;
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.45));
        }

        @keyframes starTwinkle {
            0%, 100% { opacity: 0.82; }
            50% { opacity: 1; }
        }

        @keyframes nebulaPulse {
            0% { opacity: 0.74; }
            100% { opacity: 0.9; }
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="controls">
            <button id="resetBtn">Сброс</button>
        </div>
        <div id="loading">Загрузка атрибутов...</div>
        <div id="tooltip"></div>
        <svg id="diagram"></svg>
    </div>

    <script>
        const width = window.innerWidth;
        const height = window.innerHeight;
        const centerX = width / 2;
        const centerY = height / 2;

        const svg = d3.select('#diagram')
            .attr('width', width)
            .attr('height', height);
        const containerEl = document.getElementById('container');
        const tooltipEl = document.getElementById('tooltip');

        const g = svg.append('g');
        let currentModelRotationDeg = 0;
        let rotationAnimFrameId = null;
        let warpAnimFrameId = null;

        function updateSpaceBackground(transform = d3.zoomIdentity) {
            const x = transform.x || 0;
            const y = transform.y || 0;
            const k = transform.k || 1;
            const rotRad = currentModelRotationDeg * Math.PI / 180;
            const rotationParallaxX = Math.sin(rotRad) * 120;
            const rotationParallaxY = -Math.cos(rotRad) * 120;

            containerEl.style.setProperty('--space-x', `${(x * 1.2 + rotationParallaxX).toFixed(2)}px`);
            containerEl.style.setProperty('--space-y', `${(y * 1.2 + rotationParallaxY).toFixed(2)}px`);
            containerEl.style.setProperty('--space-scale', k.toFixed(4));
            containerEl.style.setProperty('--space-rot', currentModelRotationDeg.toFixed(2));
        }

        function triggerWarpJump(intensity = 1, duration = 780) {
            const clamped = Math.max(0, Math.min(1.6, intensity));
            if (warpAnimFrameId) {
                window.cancelAnimationFrame(warpAnimFrameId);
            }

            const start = performance.now();
            const safeDuration = Math.max(180, duration);

            function step(now) {
                const progress = Math.min(1, (now - start) / safeDuration);
                const easedOut = 1 - Math.pow(1 - progress, 3);
                const value = clamped * (1 - easedOut);
                containerEl.style.setProperty('--warp', value.toFixed(3));

                if (progress < 1) {
                    warpAnimFrameId = window.requestAnimationFrame(step);
                } else {
                    containerEl.style.setProperty('--warp', '0');
                    warpAnimFrameId = null;
                }
            }

            containerEl.style.setProperty('--warp', clamped.toFixed(3));
            warpAnimFrameId = window.requestAnimationFrame(step);
        }

        function animateModelRotationTo(targetDeg, duration = 750) {
            if (rotationAnimFrameId) {
                window.cancelAnimationFrame(rotationAnimFrameId);
            }

            const startDeg = currentModelRotationDeg;
            const startTime = performance.now();
            const safeDuration = Math.max(1, duration);

            function step(now) {
                const progress = Math.min(1, (now - startTime) / safeDuration);
                const eased = d3.easeCubicInOut(progress);
                currentModelRotationDeg = startDeg + (targetDeg - startDeg) * eased;
                updateSpaceBackground(d3.zoomTransform(svg.node()));

                if (progress < 1) {
                    rotationAnimFrameId = window.requestAnimationFrame(step);
                } else {
                    currentModelRotationDeg = targetDeg;
                    updateSpaceBackground(d3.zoomTransform(svg.node()));
                    rotationAnimFrameId = null;
                }
            }

            rotationAnimFrameId = window.requestAnimationFrame(step);
        }

        const zoom = d3.zoom()
            .scaleExtent([0.1, 4])
            .on('zoom', (event) => {
                g.attr('transform', event.transform);
                updateSpaceBackground(event.transform);
            });

        svg.call(zoom);
        updateSpaceBackground(d3.zoomIdentity);

        const layerNames = ['источник', 'дерево', 'бронза', 'серебро', 'золото', 'небо'];
        const layerColors = {
            'источник': '#ffffff',
            'дерево': '#8B4513',
            'бронза': '#CD7F32',
            'серебро': '#C0C0C0',
            'золото': '#FFD700',
            'небо': '#87CEEB'
        };

        const nodeRadius = 25;
        const layerRadii = [0, 100, 250, 400, 570, 770, 1000];

        let nodesData = [];
        let linksData = [];
        let selectedNode = null;
        let basePositionsReady = false;

        function sanitizeSvgInput(svgString) {
            if (typeof svgString !== 'string') return '';
            return svgString
                .replace(/<script[\s\S]*?>[\s\S]*?<\/script>/gi, '')
                .replace(/\son\w+="[^"]*"/gi, '')
                .replace(/\son\w+='[^']*'/gi, '');
        }

        function resolveIconDataUrl(iconValue, iconSvgValue) {
            const iconSvgRaw = typeof iconSvgValue === 'string' ? iconSvgValue.trim() : '';
            const iconRaw = typeof iconValue === 'string' ? iconValue.trim() : '';
            const raw = iconSvgRaw || iconRaw;
            if (!raw) return '';

            if (/^data:image\/svg\+xml/i.test(raw)) {
                return raw;
            }

            if (/^(https?:\/\/|\.\/|\/|[A-Za-z]:\\)/i.test(raw)) {
                return raw;
            }

            const svgMarkup = raw.includes('<svg')
                ? sanitizeSvgInput(raw)
                : `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">${sanitizeSvgInput(raw)}</svg>`;
            return `data:image/svg+xml;charset=utf-8,${encodeURIComponent(svgMarkup)}`;
        }

        async function loadAttributes() {
            const loadingEl = document.getElementById('loading');
            try {
                const response = await fetch('./attributes.data.json', { cache: 'no-store' });
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                const localAttributes = await response.json();
                buildTree(localAttributes, localAttributes.title || 'Источник');
            } catch (error) {
                console.error('Failed to load local JSON, using default structure', error);
                buildDefaultTree();
            } finally {
                loadingEl.style.display = 'none';
            }
        }

        function buildDefaultTree() {
            const nodes = [];
            const links = [];
            let nodeId = 0;

            const sourceNode = {
                id: 'source',
                name: 'Источник',
                description: 'Первичный источник восхождения.',
                layer: -1,
                nodeId: nodeId++,
                iconDataUrl: '',
                children: []
            };
            nodes.push(sourceNode);

            const rootNodes = [
                { id: 'body', name: 'Тело', description: 'Базовый физический атрибут.', layer: 0 },
                { id: 'spirit', name: 'Дух', description: 'Базовый духовный атрибут.', layer: 0 },
                { id: 'mind', name: 'Разум', description: 'Базовый ментальный атрибут.', layer: 0 }
            ];

            rootNodes.forEach((root, rootIndex) => {
                const rootNodeData = { ...root, nodeId: nodeId++, parent: sourceNode, children: [] };
                nodes.push(rootNodeData);
                links.push({ source: sourceNode, target: rootNodeData });
                sourceNode.children.push(rootNodeData);

                createChildren(rootNodeData, 1, nodes, links);
            });

            nodesData = nodes;
            linksData = links;
            renderDiagram();
        }

        function createChildren(parent, layer, nodes, links) {
            if (layer >= 5) return;

            for (let i = 0; i < 3; i++) {
                const child = {
                    id: `${parent.id}_${layer}_${i}`,
                    name: `${layerNames[layer + 1]} ${i + 1}`,
                    description: '',
                    iconDataUrl: '',
                    layer: layer,
                    nodeId: nodes.length,
                    parent: parent,
                    children: []
                };
                nodes.push(child);
                links.push({ source: parent, target: child });
                parent.children.push(child);

                createChildren(child, layer + 1, nodes, links);
            }
        }

        function buildTree(attributes, sourceTitle = 'Источник') {
            const nodes = [];
            const links = [];
            let nodeId = 0;
            const sourceDescription = typeof attributes?.description === 'string'
                ? attributes.description.replace(/\s+/g, ' ').trim()
                : 'неизвестно';
            const sourceSkills = typeof attributes?.skills === 'string'
                ? attributes.skills.trim()
                : '';

            const sourceNode = {
                id: 'source',
                name: sourceTitle,
                description: sourceDescription || 'неизвестно',
                layer: -1,
                nodeId: nodeId++,
                skills: sourceSkills || '',
                iconDataUrl: resolveIconDataUrl(attributes?.icon, attributes?.iconSvg),
                children: []
            };
            nodes.push(sourceNode);

            const processNode = (attr, layer, parent = null) => {
                const normalizedTitle = typeof attr.title === 'string' ? attr.title.trim() : '';
                const normalizedName = typeof attr.name === 'string' ? attr.name.trim() : '';
                const normalizedDescription = typeof attr.description === 'string' ? attr.description.trim() : '';
                const normalizedSkills = typeof attr.skills === 'string' ? attr.skills.trim() : '';
                const rawDisplayName = (normalizedTitle && normalizedTitle !== '*')
                    ? normalizedTitle
                    : (normalizedName || 'неизвестно');
                const displayName = rawDisplayName.replace(/\s+/g, ' ').trim();
                const normalizedNodeDescription = normalizedDescription
                    ? normalizedDescription.replace(/\s+/g, ' ').trim()
                    : 'неизвестно';

                const node = {
                    id: attr.id || `node_${nodeId}`,
                    name: displayName,
                    description: normalizedNodeDescription,
                    skills: normalizedSkills || '',
                    iconDataUrl: resolveIconDataUrl(attr.icon, attr.iconSvg),
                    layer: layer,
                    nodeId: nodeId++,
                    parent: parent,
                    children: []
                };

                nodes.push(node);

                if (parent) {
                    links.push({ source: parent, target: node });
                    parent.children.push(node);
                }

                if (Array.isArray(attr.children) && attr.children.length > 0 && layer < 4) {
                    attr.children.forEach(child => {
                        processNode(child, layer + 1, node);
                    });
                } else if (layer < 4) {
                    for (let i = 0; i < 3; i++) {
                        const childAttr = {
                            id: `${node.id}_${i}`,
                            name: `${layerNames[layer + 2]} ${i + 1}`
                        };
                        processNode(childAttr, layer + 1, node);
                    }
                }

                return node;
            };

            const rootAttributes = Array.isArray(attributes)
                ? attributes
                : Array.isArray(attributes?.children)
                    ? attributes.children
                    : Array.isArray(attributes?.roots)
                        ? attributes.roots
                        : null;

            if (rootAttributes) {
                rootAttributes.slice(0, 3).forEach(attr => {
                    processNode(attr, 0, sourceNode);
                });
            } else {
                buildDefaultTree();
                return;
            }

            nodesData = nodes;
            linksData = links;
            renderDiagram();
        }

        function renderDiagram() {
            function getTextStyleForLayer(nodeLayer) {
                const layerKey = layerNames[nodeLayer + 1];
                const fillColor = layerColors[layerKey] || '#777777';
                const rgb = d3.color(fillColor).rgb();
                const luminance = (0.2126 * rgb.r + 0.7152 * rgb.g + 0.0722 * rgb.b) / 255;
                const textColor = luminance > 0.5 ? '#0b0b0b' : '#f7f9ff';
                const strokeColor = luminance > 0.5 ? '#f7f9ff' : '#0b0b0b';

                return { textColor, strokeColor };
            }

            const nodesByLayer = d3.group(nodesData, d => d.layer);
            const sortedLayers = Array.from(nodesByLayer.keys()).sort((a, b) => a - b);
            const computedLayerRadii = new Map();
            const nodeDiameter = nodeRadius * 2;
            const minArcGap = 6;
            const minLayerGap = nodeDiameter + 14;
            const skyLayer = layerNames.indexOf('небо') - 1;

            sortedLayers.forEach(layer => {
                const layerNodes = nodesByLayer.get(layer) || [];
                const nodesInLayer = layerNodes.length;
                const baseRadius = layerRadii[layer + 1] || 0;

                if (layer === -1) {
                    computedLayerRadii.set(layer, 0);
                    return;
                }
                if (layer === skyLayer) {
                    return;
                }

                const minRadiusByCircumference = (nodesInLayer * (nodeDiameter + minArcGap)) / (2 * Math.PI);
                const prevLayerRadius = computedLayerRadii.get(layer - 1) || 0;
                const minRadiusByPreviousLayer = prevLayerRadius + minLayerGap;
                const radius = Math.max(baseRadius, minRadiusByCircumference, minRadiusByPreviousLayer);
                computedLayerRadii.set(layer, radius);
            });

            sortedLayers.forEach(layer => {
                const layerNodes = nodesByLayer.get(layer) || [];
                const nodesInLayer = layerNodes.length;
                const radius = computedLayerRadii.get(layer) || 0;
                if (layer === skyLayer) {
                    return;
                }

                layerNodes.forEach((node, index) => {
                    const angle = (index * 2 * Math.PI / nodesInLayer) - Math.PI / 2;

                    node.x = centerX + Math.cos(angle) * radius;
                    node.y = centerY + Math.sin(angle) * radius;
                    node.baseX = node.x;
                    node.baseY = node.y;
                });
            });

            // "Небо" располагаем в линию от каждого родителя "Золото" наружу.
            const skyNodes = nodesByLayer.get(skyLayer) || [];
            const skyStep = nodeDiameter + 10;
            skyNodes.forEach(node => {
                if (!node.parent) {
                    node.x = centerX;
                    node.y = centerY;
                    node.baseX = node.x;
                    node.baseY = node.y;
                    return;
                }

                const parent = node.parent;
                const dx = parent.x - centerX;
                const dy = parent.y - centerY;
                const parentDistance = Math.hypot(dx, dy) || 1;
                const ux = dx / parentDistance;
                const uy = dy / parentDistance;
                const childIndex = (parent.children || []).indexOf(node);
                const stepIndex = childIndex >= 0 ? childIndex + 1 : 1;

                node.x = parent.x + ux * skyStep * stepIndex;
                node.y = parent.y + uy * skyStep * stepIndex;
                node.baseX = node.x;
                node.baseY = node.y;
            });
            basePositionsReady = true;

            function buildCurvedLinkPath(link) {
                const x1 = link.source.x;
                const y1 = link.source.y;
                const x2 = link.target.x;
                const y2 = link.target.y;
                const dx = x2 - x1;
                const dy = y2 - y1;
                const distance = Math.hypot(dx, dy) || 1;

                const ux = dx / distance;
                const uy = dy / distance;
                const nx = -uy;
                const ny = ux;

                // S-curve with opposite normal offsets creates an inflection near segment middle.
                const offset = Math.max(8, Math.min(42, distance * 0.2));
                const c1x = x1 + dx * 0.33 + nx * offset;
                const c1y = y1 + dy * 0.33 + ny * offset;
                const c2x = x1 + dx * 0.66 - nx * offset;
                const c2y = y1 + dy * 0.66 - ny * offset;

                return `M ${x1},${y1} C ${c1x},${c1y} ${c2x},${c2y} ${x2},${y2}`;
            }

            const links = g.selectAll('.link')
                .data(linksData)
                .join('path')
                .attr('class', 'link')
                .attr('d', d => buildCurvedLinkPath(d))
                .attr('marker-end', 'url(#arrowhead)');

            svg.append('defs').append('marker')
                .attr('id', 'arrowhead')
                .attr('viewBox', '-0 -5 10 10')
                .attr('refX', 20)
                .attr('refY', 0)
                .attr('orient', 'auto')
                .attr('markerWidth', 6)
                .attr('markerHeight', 6)
                .append('svg:path')
                .attr('d', 'M 0,-5 L 10 ,0 L 0,5')
                .attr('fill', '#666');

            const nodes = g.selectAll('.node')
                .data(nodesData)
                .join('g')
                .attr('class', 'node')
                .attr('transform', d => `translate(${d.x},${d.y})`);

            function getRankName(node) {
                const key = layerNames[node.layer + 1];
                if (!key) return 'неизвестно';
                return key.charAt(0).toUpperCase() + key.slice(1);
            }

            function escapeHtml(value) {
                return String(value || '')
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;')
                    .replace(/'/g, '&#39;');
            }

            function updateTooltipPosition(event) {
                const offsetX = 16;
                const offsetY = 16;
                const tooltipRect = tooltipEl.getBoundingClientRect();
                let left = event.clientX + offsetX;
                let top = event.clientY + offsetY;

                if (left + tooltipRect.width > width - 10) {
                    left = event.clientX - tooltipRect.width - 14;
                }
                if (top + tooltipRect.height > height - 10) {
                    top = event.clientY - tooltipRect.height - 14;
                }
                left = Math.max(10, left);
                top = Math.max(10, top);

                tooltipEl.style.left = `${left}px`;
                tooltipEl.style.top = `${top}px`;
            }

            function showTooltip(event, node) {
                const description = (node.description || '').replace(/\s+/g, ' ').trim() || 'неизвестно';
                const skills = (node.skills || '').replace(/\s+/g, ' ').trim();
                const rankKey = layerNames[node.layer + 1];
                const rankColor = layerColors[rankKey] || '#ffffff';
                const iconBlock = node.iconDataUrl
                    ? `
                    <div class="tooltip-icon-wrap" style="--rank-color: ${escapeHtml(rankColor)}; border-color: ${escapeHtml(rankColor)};">
                        <img class="tooltip-icon" src="${escapeHtml(node.iconDataUrl)}" alt="icon">
                    </div>
                `
                    : '';
                const skillsBlock = skills
                    ? `
                    <div class="tooltip-label">Скиллы</div>
                    <div class="tooltip-value">${escapeHtml(skills)}</div>
                `
                    : '';
                const content = `
                    ${iconBlock}
                    <div style="${node.iconDataUrl ? 'padding-right: 86px;' : ''}">
                    <div class="tooltip-label">Ранг</div>
                    <div class="tooltip-value">${escapeHtml(getRankName(node))}</div>
                    <div class="tooltip-label">Атрибут</div>
                    <div class="tooltip-value">${escapeHtml(node.name)}</div>
                    <div class="tooltip-label">Описание</div>
                    <div class="tooltip-value">${escapeHtml(description)}</div>
                    ${skillsBlock}
                    </div>
                `;

                tooltipEl.innerHTML = content;
                updateTooltipPosition(event);
                tooltipEl.classList.add('visible');
            }

            function hideTooltip() {
                tooltipEl.classList.remove('visible');
            }

            nodes.append('circle')
                .attr('class', 'node-circle')
                .attr('r', nodeRadius)
                .attr('fill', d => layerColors[layerNames[d.layer + 1]])
                .on('mouseenter', (event, d) => {
                    showTooltip(event, d);
                })
                .on('mousemove', (event) => {
                    updateTooltipPosition(event);
                })
                .on('mouseleave', () => {
                    hideTooltip();
                })
                .on('click', (event, d) => {
                    event.stopPropagation();
                    focusNode(d);
                });

            nodes.filter(d => !!d.iconDataUrl)
                .append('image')
                .attr('class', 'node-icon-image')
                .attr('href', d => d.iconDataUrl)
                .attr('x', -nodeRadius)
                .attr('y', -nodeRadius)
                .attr('width', nodeRadius * 2)
                .attr('height', nodeRadius * 2)
                .attr('preserveAspectRatio', 'xMidYMid slice');

            nodes.append('text')
                .attr('class', 'node-text')
                .attr('y', nodeRadius)
                .text(d => d.name)
                .style('fill', d => getTextStyleForLayer(d.layer).textColor)
                .style('stroke', d => getTextStyleForLayer(d.layer).strokeColor)
                .style('font-size', d => d.layer === -1 ? '16px' : d.layer === 0 ? '14px' : '10px')
                .call(wrap, nodeRadius * 2 - 5);

            svg.on('click', () => {
                resetFocus();
            });
        }

        function focusNode(node) {
            selectedNode = node;

            const relatedNodes = new Set();
            const relatedLinks = new Set();

            relatedNodes.add(node);

            if (node.parent) {
                relatedNodes.add(node.parent);
                linksData.forEach(link => {
                    if (link.target === node) {
                        relatedLinks.add(link);
                    }
                });
            }

            node.children.forEach(child => {
                relatedNodes.add(child);
                linksData.forEach(link => {
                    if (link.source === node && link.target === child) {
                        relatedLinks.add(link);
                    }
                });
            });

            g.selectAll('.node-circle')
                .classed('focused', d => relatedNodes.has(d))
                .classed('dimmed', d => !relatedNodes.has(d));

            g.selectAll('.link')
                .classed('focused', d => relatedLinks.has(d))
                .classed('dimmed', d => !relatedLinks.has(d));

            rotateToFocus(node);
        }

        function rotatePointAroundCenter(x, y, angleRad) {
            const cosA = Math.cos(angleRad);
            const sinA = Math.sin(angleRad);
            const dx = x - centerX;
            const dy = y - centerY;

            return {
                x: centerX + (dx * cosA - dy * sinA),
                y: centerY + (dx * sinA + dy * cosA)
            };
        }

        function updateNodeAndLinkPositions(duration = 750) {
            g.selectAll('.node')
                .transition()
                .duration(duration)
                .attr('transform', d => `translate(${d.x},${d.y})`);

            function buildCurvedLinkPath(link) {
                const x1 = link.source.x;
                const y1 = link.source.y;
                const x2 = link.target.x;
                const y2 = link.target.y;
                const dx = x2 - x1;
                const dy = y2 - y1;
                const distance = Math.hypot(dx, dy) || 1;

                const ux = dx / distance;
                const uy = dy / distance;
                const nx = -uy;
                const ny = ux;
                const offset = Math.max(8, Math.min(42, distance * 0.2));
                const c1x = x1 + dx * 0.33 + nx * offset;
                const c1y = y1 + dy * 0.33 + ny * offset;
                const c2x = x1 + dx * 0.66 - nx * offset;
                const c2y = y1 + dy * 0.66 - ny * offset;

                return `M ${x1},${y1} C ${c1x},${c1y} ${c2x},${c2y} ${x2},${y2}`;
            }

            g.selectAll('.link')
                .transition()
                .duration(duration)
                .attr('d', d => buildCurvedLinkPath(d));
        }

        function applyRotationToModel(rotationRad, duration = 750) {
            if (!basePositionsReady) return;

            nodesData.forEach(node => {
                const rotated = rotatePointAroundCenter(node.baseX, node.baseY, rotationRad);
                node.x = rotated.x;
                node.y = rotated.y;
            });

            updateNodeAndLinkPositions(duration);
        }

        function rotateToFocus(node) {
            const focusNodes = [node];
            if (node.parent) focusNodes.push(node.parent);
            if (node.children && node.children.length) {
                node.children.forEach(child => focusNodes.push(child));
            }

            let rotationRad = 0;

            if (node.parent) {
                const parentDirection = Math.atan2(
                    node.parent.baseY - node.baseY,
                    node.parent.baseX - node.baseX
                );
                const targetParentDirection = Math.PI / 2;
                rotationRad = targetParentDirection - parentDirection;
            } else if (node.children && node.children.length) {
                const childrenCenter = node.children.reduce(
                    (acc, child) => {
                        acc.x += child.baseX;
                        acc.y += child.baseY;
                        return acc;
                    },
                    { x: 0, y: 0 }
                );
                childrenCenter.x /= node.children.length;
                childrenCenter.y /= node.children.length;

                const childrenDirection = Math.atan2(
                    childrenCenter.y - node.baseY,
                    childrenCenter.x - node.baseX
                );
                const targetChildrenDirection = -Math.PI / 2;
                rotationRad = targetChildrenDirection - childrenDirection;
            }

            const targetRotationDeg = rotationRad * 180 / Math.PI;
            animateModelRotationTo(targetRotationDeg, 750);
            triggerWarpJump(Math.min(1.5, Math.abs(rotationRad) * 0.85 + 0.6));
            applyRotationToModel(rotationRad, 750);

            const xs = focusNodes.map(n => n.x);
            const ys = focusNodes.map(n => n.y);
            const minX = Math.min(...xs);
            const maxX = Math.max(...xs);
            const minY = Math.min(...ys);
            const maxY = Math.max(...ys);

            const boxWidth = Math.max(maxX - minX, nodeRadius * 3) + nodeRadius * 2;
            const boxHeight = Math.max(maxY - minY, nodeRadius * 3) + nodeRadius * 2;
            const margin = 28;
            const availableWidth = Math.max(120, width - margin * 2);
            const availableHeight = Math.max(120, height - margin * 2);
            const scale = Math.max(
                0.45,
                Math.min(
                    3.5,
                    Math.min(
                        availableWidth / boxWidth,
                        availableHeight / boxHeight
                    )
                )
            );

            const focusCenterX = (minX + maxX) / 2;
            const focusCenterY = (minY + maxY) / 2;
            const translateX = centerX - scale * focusCenterX;
            const translateY = centerY - scale * focusCenterY;

            const transform = d3.zoomIdentity
                .translate(translateX, translateY)
                .scale(scale);

            svg.transition()
                .duration(750)
                .call(zoom.transform, transform);
        }

        function resetFocus() {
            selectedNode = null;
            
            g.selectAll('.node-circle')
                .classed('focused', false)
                .classed('dimmed', false);

            g.selectAll('.link')
                .classed('focused', false)
                .classed('dimmed', false);

            if (basePositionsReady) {
                nodesData.forEach(node => {
                    node.x = node.baseX;
                    node.y = node.baseY;
                });
                updateNodeAndLinkPositions(750);
            }

            animateModelRotationTo(0, 750);

            svg.transition()
                .duration(750)
                .call(zoom.transform, d3.zoomIdentity);
        }

        function wrap(text, width) {
            text.each(function() {
                const text = d3.select(this);
                const yBase = Number.parseFloat(text.attr('y')) || 0;
                const normalizedText = (text.text() || '').replace(/\s+/g, ' ').trim();
                text.text(null);

                if (!normalizedText) {
                    return;
                }

                const words = normalizedText.split(' ');
                const lineHeightEm = 1.1;
                const lines = [];
                let currentLineWords = [];
                const measureTspan = text.append('tspan').attr('x', 0).attr('y', 0).attr('dy', '0em');

                words.forEach(word => {
                    const candidateWords = [...currentLineWords, word];
                    measureTspan.text(candidateWords.join(' '));

                    if (measureTspan.node().getComputedTextLength() <= width || currentLineWords.length === 0) {
                        currentLineWords = candidateWords;
                    } else {
                        lines.push(currentLineWords.join(' '));
                        currentLineWords = [word];
                    }
                });

                if (currentLineWords.length > 0) {
                    lines.push(currentLineWords.join(' '));
                }

                measureTspan.remove();

                const lineCount = lines.length;
                // Bottom align label block to yBase (icon lower edge).
                const startDy = -((lineCount - 1) * lineHeightEm);

                lines.forEach((lineText, index) => {
                    text.append('tspan')
                        .attr('x', 0)
                        .attr('y', yBase)
                        .attr('dy', `${startDy + index * lineHeightEm}em`)
                        .text(lineText);
                });
            });
        }

        document.getElementById('resetBtn').addEventListener('click', resetFocus);

        loadAttributes();
    </script>
</body>
</html>
